name: ci

# Work happens on `dev`. Tests run when code is headed for `main`: on the PR
# that merges it, and again on main itself. The image only publishes if they
# pass. Day-to-day pushes to `dev` don't burn CI minutes.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: typecheck shared contract
        run: npm run -w shared typecheck

      - name: typecheck server
        run: npm run -w server typecheck

      # schema.ts is the source of truth, but only if someone remembers to
      # regenerate. Editing it without doing so is how the schema drifted from
      # the DDL in the first place. Fail here rather than at boot on a server.
      - name: migrations match schema.ts
        run: |
          npm run -w server db:generate
          git diff --exit-code --stat server/drizzle \
            || (echo "::error::schema.ts changed without a migration. Run 'npm run -w server db:generate' and commit drizzle/." && exit 1)

      - name: test server
        run: npm run -w server test

      - name: check client
        run: npm run -w client check

  publish:
    needs: test
    # A PR gets the test job for feedback but must not publish an image.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # arm64 is emulated; buildx needs the binfmt handlers to run it.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
