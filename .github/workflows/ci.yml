name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: format
        run: npm run format:check

      - name: lint
        run: npm run lint

      - name: typecheck shared contract
        run: npm run -w shared typecheck

      - name: typecheck server
        run: npm run -w server typecheck

      - name: migrations match schema.ts
        run: |
          npm run -w server db:generate
          git diff --exit-code --stat server/drizzle \
            || (echo "::error::schema.ts changed without a migration. Run 'npm run -w server db:generate' and commit drizzle/." && exit 1)

      - name: test server
        run: npm run -w server test

      - name: check client
        run: npm run -w client check

      - name: test client
        run: npm run -w client test

      - name: emoji data matches its generator
        run: |
          npm run -w client emoji:gen
          git diff --exit-code --stat client/src/lib/emoji/data.ts \
            || (echo "::error::emoji/data.ts is out of date or was hand-edited. Run 'npm run -w client emoji:gen' and commit it." && exit 1)

  publish:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # arm64 is emulated; buildx needs the binfmt handlers to run it.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
