name: ccchat

services:
  # ── The only thing exposed to the internet ─────────────────────────────────
  # Terminates TLS with an automatic Let's Encrypt certificate, and serves both
  # the app and the voice signaling from one origin. See ./Caddyfile.
  caddy:
    image: caddy:2-alpine
    container_name: ccchat-caddy
    restart: unless-stopped
    ports:
      - '80:80' # required for the Let's Encrypt HTTP challenge
      - '443:443'
      - '443:443/udp' # HTTP/3
    environment:
      CCCHAT_DOMAIN: ${CCCHAT_DOMAIN:?set CCCHAT_DOMAIN in .env (e.g. chat.example.com)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data # certificates live here — do not delete
      - caddy_config:/config
    depends_on:
      - ccchat
      - livekit

  # ── The app: REST API, WebSocket, and the built client ─────────────────────
  # Not published to the host: it is only reachable through Caddy.
  ccchat:
    image: ${CCCHAT_IMAGE:-ghcr.io/OWNER/ccchat:latest} # TODO(repo): set OWNER
    container_name: ccchat
    restart: unless-stopped
    environment:
      DATA_DIR: /app/data
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-ccchat}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?run ./install.sh, or set LIVEKIT_API_SECRET in .env}
      # The community name and the owner account are created in the browser on
      # first visit, so there is nothing to configure here.
    volumes:
      # Your entire community (accounts, channels, messages) is this one folder.
      # Back it up and you have backed up everything.
      - ./data:/app/data
    depends_on:
      - livekit

  # ── Voice ──────────────────────────────────────────────────────────────────
  # Signaling goes through Caddy (/livekit). Media does NOT — WebRTC audio is
  # UDP straight to the host, so 7882/udp must be open on your firewall/router.
  livekit:
    image: livekit/livekit-server:latest
    container_name: ccchat-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: '${LIVEKIT_API_KEY:-ccchat}: ${LIVEKIT_API_SECRET:?run ./install.sh, or set LIVEKIT_API_SECRET in .env}'
    ports:
      - '7882:7882/udp' # media (UDP) — the one port you must forward
      - '7881:7881' # media over TCP, fallback for restrictive networks
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  caddy_data:
  caddy_config:
