name: ccchat

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    container_name: ccchat-caddy
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 128M
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      CCCHAT_DOMAIN: ${CCCHAT_DOMAIN:?set CCCHAT_DOMAIN in .env (e.g. chat.example.com)}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      ccchat:
        condition: service_healthy
      livekit:
        condition: service_started

  ccchat:
    image: ${CCCHAT_IMAGE:-ghcr.io/lucien-n/kit-ccchat:latest}
    container_name: ccchat
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      DATA_DIR: /app/data
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-ccchat}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?run ./install.sh, or set LIVEKIT_API_SECRET in .env}
    volumes:
      # Your entire community (accounts, channels, messages) is this one folder.
      # Back it up and you have backed up everything.
      - ./data:/app/data
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    container_name: ccchat-livekit
    restart: unless-stopped
    logging: *logging
    deploy:
      resources:
        limits:
          memory: 512M
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-ccchat}: ${LIVEKIT_API_SECRET:?run ./install.sh, or set LIVEKIT_API_SECRET in .env}"
    ports:
      - "7882:7882/udp"
      - "7881:7881"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  caddy_data:
  caddy_config:
