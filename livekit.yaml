# LiveKit SFU — powers voice channels (comfortably 20+ people per room).
#
# There is nothing to edit here. The API key/secret are injected from the
# environment (LIVEKIT_KEYS in docker-compose.yml), generated once by the
# installer, and signaling is fronted by Caddy at /livekit on your own domain.

port: 7880 # signaling (WebSocket) — Caddy proxies to this, it is not exposed

rtc:
  # Media ports. UDP is what you want (lowest latency); TCP is the fallback for
  # people behind restrictive corporate/hotel networks. Both are published by
  # docker-compose and must be open on the host firewall.
  udp_port: 7882
  tcp_port: 7881
  # Discover the host's public address via STUN and advertise it to browsers.
  # Correct on a real Linux host, which is the only place voice is supported.
  use_external_ip: true

# ⚠️ Voice does NOT work when LiveKit runs under Docker Desktop on Windows/macOS:
# its network layer cannot pass WebRTC UDP media (STUN succeeds, then the DTLS
# handshake times out — a documented Docker Desktop limitation). This is not a
# ccchat bug and there is no compose-side workaround. It works fine on a real
# Linux host, which is what you deploy to. To exercise voice locally on Windows,
# run LiveKit natively instead:
#
#   livekit-server --config livekit.yaml --node-ip 127.0.0.1
#
# ...and set LIVEKIT_URL=ws://localhost:7880 in .env to bypass the proxy.
# Text chat is unaffected either way.
